name: Feature request
description: Propose a scoped capability.
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful implementation.
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Boundaries
      description: State whether this affects Rust solver logic, API contracts, web UI, scanner, artifacts, or AI guidance.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: What tests or checks should prove it works?
