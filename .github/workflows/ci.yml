name: CI

on:
  push:
    branches: [main, autopilot/roadmap]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.11"
  RUST_VERSION: "1.95.0"

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        run: rustup toolchain install "$RUST_VERSION" --profile minimal --component clippy --component rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Rust tests
        run: cargo test --workspace --all-targets

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  node:
    name: node
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check AI routes
        run: npm run ai:check

      - name: Check rubiks cube package
        run: npm run check -w @rubiks-cube-solver/rubiks-cube

      - name: Lint rubiks cube package
        run: npm run lint -w @rubiks-cube-solver/rubiks-cube

      - name: Typecheck rubiks cube package
        run: npm run build:types -w @rubiks-cube-solver/rubiks-cube

      - name: Test rubiks cube package coverage
        run: npm run test:coverage -w @rubiks-cube-solver/rubiks-cube

      - name: Test web
        run: npm run test -w @rubiks-cube-solver/web

      - name: Lint web
        run: npm run lint -w @rubiks-cube-solver/web

      - name: Build web
        run: npm run build

      - name: Build Storybook
        run: npm run storybook:build -w @rubiks-cube-solver/web

  scanner:
    name: scanner
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            scanner/runtime/requirements.txt
            scanner/training/requirements.txt
            scanner/requirements-test.txt

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install scanner dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scanner/runtime/requirements.txt -r scanner/training/requirements.txt -r scanner/requirements-test.txt

      - name: Lint scanner Python
        run: python -m ruff check scanner

      - name: Typecheck scanner Python
        run: python -m mypy

      - name: Test scanner runtime
        run: npm run vision:test

      - name: Test scanner training
        run: npm run scanner:training:test

      - name: Check scanner coverage
        run: python -m pytest scanner/runtime scanner/training --cov=scanner --cov-report=term-missing

  docker:
    name: docker
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate Compose configuration
        run: docker compose config

      - name: Build app image
        run: docker build -f Dockerfile.app .

      - name: Build vision image
        run: docker build -f Dockerfile.vision .

  e2e-smoke:
    name: e2e-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        run: rustup toolchain install "$RUST_VERSION" --profile minimal

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E
        run: npm run test:e2e:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: playwright-smoke-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
