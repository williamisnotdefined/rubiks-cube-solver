[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []
yanked = "deny"

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib"
]
confidence-threshold = 0.8
exceptions = []

[bans]
deny = []
highlight = "all"
multiple-versions = "warn"
skip = []
skip-tree = []
wildcards = "allow"

[sources]
allow-git = []
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
unknown-git = "deny"
unknown-registry = "deny"
