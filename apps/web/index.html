<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Speedcube: online Rubik's Cube solver, speedcubing timer, notation guides, and algorithm library."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <script nonce="speedcube-jsonld">
      try {
        const themeRoot = document.documentElement
        const storedTheme = window.localStorage.getItem('rubiks-cube-solver-theme')
        themeRoot.classList.remove('dark', 'light')
        if (storedTheme === 'dark' || storedTheme === 'light') {
          themeRoot.dataset.theme = storedTheme
          themeRoot.classList.add(storedTheme)
        } else {
          delete themeRoot.dataset.theme
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          themeRoot.classList.add(prefersDark ? 'dark' : 'light')
        }
      } catch {}
    </script>
    <title>Speedcube</title>
  </head>
  <body class="m-0 min-w-80 bg-app-bg text-app-text antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main/index.ts"></script>
  </body>
</html>
