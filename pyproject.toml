[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [
  "scanner/models",
  "scanner/outputs",
  "scanner/references",
  "scanner/runs"
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]

[tool.ruff.lint.per-file-ignores]
"scanner/**/tests/*.py" = ["E402"]

[tool.mypy]
python_version = "3.11"
files = ["scanner/contracts"]
exclude = "scanner/(models|outputs|references|runs)/"
ignore_missing_imports = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true

[tool.pytest.ini_options]
testpaths = ["scanner/runtime", "scanner/training"]
addopts = "--strict-config --strict-markers"

[tool.coverage.run]
branch = true
source = ["scanner"]
omit = [
  "scanner/**/tests/*",
  "scanner/models/*",
  "scanner/outputs/*",
  "scanner/references/*",
  "scanner/runs/*"
]

[tool.coverage.report]
fail_under = 60
show_missing = true
skip_covered = true
